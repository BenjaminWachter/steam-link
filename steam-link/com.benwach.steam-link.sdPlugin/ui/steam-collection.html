<!DOCTYPE html>
<html>

    <head lang="en">
        <title>Steam Collection Settings</title>
        <meta charset="utf-8" />
        <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
    </head>

    <body>
        <!--
            Learn more about property inspector components at https://sdpi-components.dev/docs/components
        -->
        <sdpi-item label="Steam ID" description="Your 64-bit Steam ID (e.g. 76561198000000000)">
            <sdpi-textfield id="userID" placeholder="76561198000000000"></sdpi-textfield>
        </sdpi-item>

        <sdpi-item label="Collection" description="Choose a Steam collection from discovered collections">
            <sdpi-select
                setting="collectionSelection"
                label-setting="collectionSelectionLabel"
                id="collectionSelect"
                datasource="requestCollections"
                loading="Loading collections..."
                show-refresh
            ></sdpi-select>
        </sdpi-item>

        <script src="steam-collection.js"></script>
    </body>

</html>
