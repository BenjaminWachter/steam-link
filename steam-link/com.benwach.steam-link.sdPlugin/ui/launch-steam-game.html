<!DOCTYPE html>
<html>

<head lang="en">
    <title>Launch Steam Game</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>

<body>

    <sdpi-item label="Game Index" description="Index of the game to launch from the list of games retrieved from Steam.">
        <sdpi-textfield setting="index"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Page Number" description="Page number for the game list, starting from 0. Each page contains 12 games.">
        <sdpi-textfield setting="page"></sdpi-textfield>
    </sdpi-item>

</body>

</html>
